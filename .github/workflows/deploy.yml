name: Deploy to GitHub Pages

# Builds the Astro site in /site and publishes dist/ to GitHub Pages on every
# push to main. Also supports manual re-runs via the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only keep one in-flight deploy; queue the next if another is mid-run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          # For a project page these default to <user>.github.io/<repo>/.
          # Change these (or set repo Secrets) to move to a custom domain:
          #   SITE_URL=https://utmathguide.org
          #   SITE_BASE=/
          SITE_URL: https://${{ github.repository_owner }}.github.io
          SITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
